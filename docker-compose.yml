services:
  app:
    container_name: deribit-client-app
    build: .
    depends_on:
      - db
      - redis
    command: >
      uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/src
    ports:
      - ${APP_HOST_PORT}:8000
    restart: always
    env_file:
      - .env.docker
    environment:
      - PYTHONPATH:/src
  db:
    container_name: deribit_client_db
    image: postgres:latest
    env_file:
      - .env.docker
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - ${DB_PORT}:5432
    volumes:
      - ./pgdata:/var/lib/postgresql/data/pgdata
    restart: always
  redis:
    container_name: deribit_client_redis
    image: redis:alpine
    ports:
      - ${REDIS_PORT}:6379
    volumes:
      - redis-data:/data
  celery-worker:
    container_name: deribit_client_celery_worker
    build: .
    working_dir: /src
    command: celery -A celery_app worker -l INFO
    volumes:
      - .:/src
    depends_on:
      - redis
    environment:
      - PYTHONPATH:/src
    env_file:
      - .env.docker
    restart: always
  celery-beat:
    container_name: deribit_client_celery_beat
    build: .
    working_dir: /src
    command: celery -A celery_app beat -l INFO
    volumes:
      - .:/src
    depends_on:
      - redis
    environment:
      - PYTHONPATH:/src
    env_file:
      - .env.docker
    restart: always
volumes:
  redis-data:

